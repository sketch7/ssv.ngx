name: CI

on:
  push:
    branches:
      - master
      - main
      - "*.x"
      - "workflow"
    paths-ignore:
      - "**.md"

  pull_request:
    branches:
      - master
      - main
      - "*.x"
    paths-ignore:
      - "**.md"

  workflow_dispatch:
    inputs:
      publish:
        description: "Publish 🚀"
        required: false
        type: boolean
        default: false
      force-prerelease:
        description: "Force Pre-release"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write # required for OIDC
  contents: write # required for tag push

jobs:
  package:
    name: Package
    uses: sketch7/.github/.github/workflows/node-lib.yml@node-libs-v1
    with:
      package-manager: "pnpm"
      publishable: ${{ contains(fromJSON('["develop", "master", "main", "workflow"]'), github.ref_name) || endsWith(github.ref_name, '.x') || github.event.inputs.publish == 'true' }}
      force-preid: ${{ github.event.inputs.force-prerelease == 'true' }}
      version-replace-glob: "libs/**/{package.json,version.ts}"
